<div class="container" [ngStyle]="{ 
    left: windowWidth, 
    opacity: opacityChange,
    transition: splashTransition
  }" *ngIf="showSplash">
    <div style="border: 1px solid white; width: 15%; border-radius: 2px; min-width: 175px;">
        <div class="loading-bar" style="width: 38%; height: 20px;"></div>
    </div>
    <div class="reflection" style="font-size: 20px;">
        Loading
        <div>
            Loading
        </div>
    </div>
</div>
